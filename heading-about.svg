<svg xmlns="http://www.w3.org/2000/svg" width="180" height="55">
  <defs>
    <filter id="glow1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
    </filter>
    <filter id="glow2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
    </filter>
    <filter id="glow3" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
    </filter>
  </defs>
  <!-- Glow layer 3 — wide soft bloom -->
  <text x="10" y="35" fill="rgba(0,255,65,0.15)" font-family="monospace" font-size="28" font-weight="bold" filter="url(#glow1)">About</text>
  <!-- Glow layer 2 — medium -->
  <text x="10" y="35" fill="rgba(0,255,65,0.3)" font-family="monospace" font-size="28" font-weight="bold" filter="url(#glow2)">About</text>
  <!-- Glow layer 1 — tight green -->
  <text x="10" y="35" fill="#00FF41" font-family="monospace" font-size="28" font-weight="bold" filter="url(#glow3)">About</text>
  <!-- White core -->
  <text x="10" y="35" fill="rgba(255,255,255,0.9)" font-family="monospace" font-size="28" font-weight="bold">About</text>
</svg>
